name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Production build. Fails the job (and blocks the PR, once required)
      # if anything doesn't compile/bundle — e.g. an unresolved import.
      - name: Build
        run: npm run build
